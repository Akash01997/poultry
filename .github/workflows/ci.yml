name: Code Validation

on:
  push:
    branches:
      - main
      - master
      - feature
      - "feature/**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install validators
        run: |
          npm install -g htmlhint html-validate

      - name: Validate HTML
        run: |
          htmlhint "**/*.html"
          html-validate "**/*.html"

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          find . -name "*.js" -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done

      - name: Check CSS files exist
        shell: bash
        run: |
          find . -name "*.css" | while read file; do
            echo "Found CSS: $file"
          done